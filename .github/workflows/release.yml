name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - master

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      should_release: ${{ steps.decide.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP '(?<=<Version>).*(?=</Version>)' Directory.Build.props)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag if needed
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          if ! git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.VERSION }}" | grep -q .; then
            git tag "v${{ steps.version.outputs.VERSION }}"
            git push origin "v${{ steps.version.outputs.VERSION }}"
          fi

      - name: Decide if release is needed
        id: decide
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif ! gh release view "v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore MediaOrcestrator.sln

      - name: Publish Runner
        run: >
          dotnet publish MediaOrcestrator.Runner/MediaOrcestrator.Runner.csproj
          -c Release
          -r win-x64
          --self-contained false
          /p:Version=${{ needs.prepare.outputs.version }}
          /p:UpdateRepo=${{ github.repository }}
          -o publish/app

      - name: Publish Updater
        run: >
          dotnet publish MediaOrcestrator.Updater/MediaOrcestrator.Updater.csproj
          -c Release
          -r win-x64
          --self-contained false
          /p:Version=${{ needs.prepare.outputs.version }}
          -o publish/updater

      - name: Copy Updater to app
        shell: bash
        run: |
          cp publish/updater/Updater.exe publish/app/Updater.exe
          cp publish/updater/Updater.dll publish/app/Updater.dll
          cp publish/updater/Updater.runtimeconfig.json publish/app/Updater.runtimeconfig.json
          cp publish/updater/Updater.deps.json publish/app/Updater.deps.json

      - name: Copy ModuleBuilds
        shell: bash
        run: |
          if [ -d "publish/app/ModuleBuilds" ]; then
            echo "ModuleBuilds already present from build"
          else
            echo "ModuleBuilds not found in publish output, checking build output..."
            cp -r ModuleBuilds publish/app/ModuleBuilds 2>/dev/null || echo "No ModuleBuilds to copy"
          fi

      - name: Create zip
        shell: bash
        run: |
          cd publish/app
          7z a -tzip "../../MediaOrcestrator-v${{ needs.prepare.outputs.version }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: MediaOrcestrator-v${{ needs.prepare.outputs.version }}.zip
          generate_release_notes: true
