<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <base href="{{baseUri}}" />
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            font-size: 14px;
            line-height: 1.6;
            max-width: 780px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }

        h1 {
            font-size: 22px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }

        h2 {
            font-size: 18px;
            margin-top: 24px;
        }

        h3 {
            font-size: 15px;
        }

        code {
            font-size: 13px;
            padding: 2px 5px;
            border-radius: 3px;
            background: #f4f4f4;
        }

        pre {
            overflow-x: auto;
            padding: 12px;
            border-radius: 5px;
            background: #f4f4f4;
        }

        pre code {
            padding: 0;
            background: none;
        }

        table {
            width: 100%;
            margin: 12px 0;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            text-align: left;
            border: 1px solid #ddd;
        }

        th {
            font-weight: 600;
            background: #f8f8f8;
        }

        img {
            max-width: 100%;
            height: auto;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        a {
            color: #0066cc;
        }
    </style>
</head>
<body>
    {{body}}
</body>
</html>
